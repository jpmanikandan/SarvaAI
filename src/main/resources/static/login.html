<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sarva AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .btn-google {
            background: white;
            color: #444;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background: #f8f9fa;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }

        .btn-primary {
            border-radius: 0.75rem;
            padding: 0.75rem;
            background: #0dcaf0;
            border: none;
        }

        .btn-primary:hover {
            background: #0aa2c0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card auth-card p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-atom fa-3x text-info mb-3"></i>
                        <h2 class="fw-bold">Sarva AI</h2>
                        <p class="text-muted">Enter the world of Universal Intelligence</p>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3 fw-semibold">Sign In</button>
                    </form>

                    <div class="text-center my-3 text-muted">
                        <small>OR</small>
                    </div>

                    <!-- SOCIAL LOGIN -->
                    <a href="/oauth2/authorization/google"
                        class="btn btn-google w-100 mb-3 d-flex align-items-center justify-content-center fw-semibold">
                        <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google"
                            style="width: 18px; margin-right: 10px;">
                        Sign in with Google
                    </a>

                    <div class="text-center mt-3">
                        <span class="text-muted">Don't have an account?</span>
                        <a href="#" id="showSignup" class="text-info text-decoration-none fw-semibold">Sign Up</a>
                    </div>
                    <div class="text-center mt-4 border-top pt-3">
                        <img src="images/belllabs.jpg" alt="Bell Labs"
                            style="height: 40px; border-radius: 8px; margin-bottom: 8px;">
                        <br>
                        <small class="text-muted" style="letter-spacing: 1px; font-weight: 300;">POWERED BY <span
                                class="fw-bold text-dark">BELLLABS</span></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Generic login simulated. Use Google Login for actual authentication.');
        });
        document.getElementById('showSignup').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Signup page coming soon! Use Google Sign-in for instant access.');
        });
    </script>
</body>

</html>
